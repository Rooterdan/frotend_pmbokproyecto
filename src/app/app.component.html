<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
    }

    ul.topnav {
      list-style-type: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
      margin-bottom: 30px;
      background-color: blue;
    }

    ul.topnav li {
      float: left;
    }



    ul.topnav li a {
      display: block;
      color: white;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }

    

    ul.topnav li a:hover:not(.active) {
      background-color: #111;
    }

    ul.topnav li a.active {
      background-color: #4CAF50;
    }

    ul.topnav li.right {
      float: right;
    }

    @media screen and (max-width: 600px) {

      ul.topnav li.right,
      ul.topnav li {
        float: none;
      }
    }
  </style>
</head>

<body>
<div  *ngIf="isAuth()">
  <ul class="topnav" >
    <li><a  style="{background:yellow;}" class="active" routerLink="/home">Home</a></li>
    <li><a  style="background:black;" routerLink="/participacion"> Mis proyectos </a></li>

    <li  style="background:black;" class="right"><a (click)="singOut()" routerLink="/login">Salir</a></li>
  </ul>
</div>


</body>


</html>

<router-outlet></router-outlet>
