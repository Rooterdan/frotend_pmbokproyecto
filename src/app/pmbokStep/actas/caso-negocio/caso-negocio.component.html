<div class="centrado">
    <mat-card>
        <p>
            <mat-card-title>Metas El acta del proyecto</mat-card-title>
            <mat-card-content>
                <mat-form-field appearance="outline">

                    <div *ngIf="metas; else Notmetas">
                        <textarea [(ngModel)]="casoMegocio.metas" matInput placeholder="metas...."></textarea>
                    </div>

                    <ng-template #Notmetas>
                        <textarea disabled matInput placeholder="metas....">{{casoMegocio.metas}}</textarea>
                    </ng-template>


                </mat-form-field>
            </mat-card-content>

            <mat-card-actions>

                <button  (click)="guardarmetas()" mat-button>GUARDAR</button>
            </mat-card-actions>
        </p>
    </mat-card>
</div>
<br>
<br>
