<div class="table">
    <div class="table-cell"> Fase </div>
    <div class="table-cell "> Estado </div>
    <div class="table-cell "> Opcion </div>

    <div class="table-cell cell-feature">ENTRADAS DEL ACTA </div>
    <div class="table-cell">
        <!-- **************************************-->
        <svg width="18" height="18" viewBox="0 0 18 18">
            <title>check_blue</title>
            <path
                d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
                fill="limegreen" fill-rule="evenodd" />
        </svg>

    </div>
    <div class="table-cell">
        <button (click)="entradaM()" > Ingresar </button>
    </div>
    <!-- **************************************-->
    <div class="table-cell cell-feature">CASO DE NEGOCIO</div>
    <div class="table-cell">

        <svg width="18" height="18" viewBox="0 0 18 18">
            <title>check_blue</title>
            <path
                d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
                fill="limegreen" fill-rule="evenodd" />
        </svg>

    </div>
    <div class="table-cell">
        <button (click)="casoM()" > Ingresar </button>
    </div>
    <!-- **************************************-->
    <div class="table-cell cell-feature">PLANES PARA LA GESTIÓN DE BENEFICIADOS</div>
    <div class="table-cell">

        <svg width="18" height="18" viewBox="0 0 18 18">
            <title>check_blue</title>
            <path
                d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
                fill="limegreen" fill-rule="evenodd" />
        </svg>

    </div>
    <div class="table-cell">
        <button (click)="planM()"> Ingresar </button>
    </div>
    <!-- **************************************-->
    <div class="table-cell cell-feature"> HERRAMIENTAS Y TÉCNICAS</div>
    <div class="table-cell"></div>
    <div class="table-cell">
        <button (click)="herramientaM()"> Ingresar </button>
    </div>
</div>
<!-- **************************************-->

<div class="espacio">
    <div *ngIf="entrada">ENTRADAS DEL ACTA 
        <app-entradas></app-entradas>
    </div>
    <div *ngIf="caso">CASO DE NEGOCIO
        <app-caso-negocio></app-caso-negocio>
    </div>
    <div *ngIf="plan">PLANES PARA LA GESTIÓN DE BENEFICIADOS 
        <app-plan-gestion-beneficios></app-plan-gestion-beneficios>
    </div>
    <div *ngIf="herramienta">HERRAMIENTAS Y TÉCNICAS
        <app-herramientas-acta></app-herramientas-acta>
    </div>
</div>
