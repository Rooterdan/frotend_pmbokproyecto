


    <div *ngIf="cargaEnable; else DataCaso">

    <ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple">
        <p style="font-size: 20px; color: white">Cargando... </p>
    </ngx-spinner>


</div>




<ng-template #DataCaso>

    <div >
        <p> Juicio expertos pdp </p>
        <textarea  style="resize: both;" cols="90" rows="10" style="resize: both;"  [(ngModel)]="herramientasPdp.juicioexpertos"    placeholder="Datos ..."> {{herramientasPdp.juicioexpertos}} </textarea>
    </div> 

    <div> 
        <p> Recopilacion datos pdp <button> Guardar </button> </p>
        <textarea  style="resize: both;" cols="90" rows="10" style="resize: both;" [(ngModel)]="herramientasPdp.recopilaciondatos"  matInput placeholder="Factores ..."> {{herramientasPdp.recopilaciondatos}} </textarea>
    </div>

    <div>
        <p> Habilidades  pdp <button> Guardar </button> </p>
        <textarea  style="resize: both;" cols="90" rows="10" style="resize: both;" [(ngModel)]="herramientasPdp.habilidades"  matInput placeholder="Procesos ..."> {{herramientasPdp.habilidades}} </textarea>
    </div>

  
    <div>
        <p> Herramientas reuniones  pdp <button> Guardar </button> </p>
        <textarea  style="resize: both;" cols="90" rows="10" style="resize: both;" [(ngModel)]="herramientasPdp.herramientareuniones"  matInput placeholder="Procesos ..."> {{herramientasPdp.herramientareuniones}} </textarea>
    </div>

    <div> 
        <button (click)="guardarHerramientasPdp()"> Guardar herramientas pdp </button>
    </div>

</ng-template>
