<img class="wave" src="/assets/img/fondoRegistro.svg">
<div class="form">
 
  <div class="form-panel one">
    <div class="form-header">
      <h1>Registro</h1>
    </div>
    <div class="form-content">

      <form>
        <div class="form-group">
          <label for="username">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="usuarios.email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" [(ngModel)]="usuarios.password" required />
        </div>

        <div class="form-group">
          <label for="username" class="usernames">Nombre Completo</label>
          <input type="username" id="username" name="username" [(ngModel)]="usuarios.nombre" required />
        </div>

        <div class="form-group">
          <button (click)="registrarUsuario()">Registrar</button>
        </div>
        <div *ngIf="Mensaje">
          <div class="form-header">
            <h1>
              <p *ngFor="let notf of notificacion">
                {{notf}}
              </p>
            </h1>
          </div>
        </div>

        <div class="form-group">
          <label class="form-remember">
            <a routerLink="/login"> <button type="submit">Volver</button></a>
          </label>
        </div>
      </form>
    </div>
</div>

<ngx-spinner   bdColor="rgba(51,51,51,0.8)"
size="medium"
color="#fff"
type="ball-spin-clockwise-fade">
<p style="font-size: 20px; color: white">Loading...</p>
</ngx-spinner>

</div>
