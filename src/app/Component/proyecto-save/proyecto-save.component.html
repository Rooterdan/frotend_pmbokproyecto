<form>

  <div class="group">
    <input  name="nombre" [(ngModel)]="proyecto.nombre" type="text" >
    <span class="highlight"></span><span class="bar"></span>
    <label>Name</label>
  </div>

  <a>Descripcion</a>
  <div class="group">
    <textarea name="descripcion" cols="37" rows="4" [(ngModel)]="proyecto.descripcion">   </textarea>
  </div>
  <button (click)="guardarNuevoProyecto()" type="button" class="button buttonBlue">Crear proyecto </button>
</form>
