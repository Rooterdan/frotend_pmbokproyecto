<!DOCTYPE html>
<html> 
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="/assets/js/login.js"></script>
</head> 



<div class="container">
	<div class="container-left">
		<img class="wave" src="/assets/img/loginUp/fondoLogin.svg" alt="image">
		<img class="wave2" src="/assets/img/loginUp/reading.svg" alt="image">
	</div>

	<div class="container-right" >
		<div class="login-form-container">
			<h1>INICIO DE SESION</h1>
			<div class ="div-row"> 
				<i class="fas fa-envelope" style="margin-left:-22px;padding-right:10px"></i>
				<input type="email"  class="input-field" placeholder="Email" name="email"  [(ngModel)]="usuarios.email" required/>
			</div>

			<div class ="div-row">
				<i class="fas fa-lock" style="padding-right:18px"></i>
				<input placeholder="Password" [type]="fieldTextType ? 'text':'password'" class="input-field" [(ngModel)]="usuarios.password" required /> 
				<i class="fa" style="padding-left:15px" [ngClass]="{'fa-eye-slash': !fieldTextType,'fa-eye': fieldTextType }"(click)="toggleFieldTextType()"></i> 
			</div> 
			
			<button (click) = "ingresar()"  class="btn">INGRESAR</button>
			<p class="message">¿Aún no te registras?  <a routerLink="/register">registrarse</a></p>
		</div> 

	</div>
</div> 
 
<ngx-spinner   bdColor="rgba(51,51,51,0.8)" size="medium"  color="#fff"  type="ball-spin-clockwise-fade">
<p style="font-size: 20px; color: white">Cargando...</p>
</ngx-spinner>

</html>
