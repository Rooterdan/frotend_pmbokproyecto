<div class="table">
    <div class="table-cell"> Fase </div>
    <div class="table-cell "> Estado </div>
    <div class="table-cell "> Opcion </div>

    <div class="table-cell cell-feature">Acta de constitucion del proyecto </div>
    <div class="table-cell">
        <!-- **************************************-->
        <div *ngIf="actaDeConstitucionDelProyecto; else elseBlock">

            <svg width="18" height="18" viewBox="0 0 18 18">
            <title>check_blue</title>
            <path
              d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
              fill="limegreen" fill-rule="evenodd" />
          </svg>

        </div>
        <ng-template #elseBlock></ng-template>


        <!-- **************************************-->
    </div>
    <div class="table-cell">
        <div *ngIf="actaDeConstitucionDelProyecto; else elseBlockBotones">
            <button routerLink="/vistaActas"> Ver Información </button>
            <button disabled routerLink="/Actas"> Ingresar </button>
        </div>
        <ng-template #elseBlockBotones>
            <button routerLink="/vistaActas"> Ver Información </button>
            <button routerLink="/Actas"> Ingresar </button>
        </ng-template>



    </div>
    <!-- *******************************************************************************************-->


    <div class="table-cell cell-feature"> Plan para la direccion de proyectos </div>
    <div class="table-cell">
        <!-- **************************************-->

        <div *ngIf="checkEstadoActaVar; else elseBlock">

            <svg width="18" height="18" viewBox="0 0 18 18">
          <title>check_blue</title>
          <path
            d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
            fill="limegreen" fill-rule="evenodd" />
        </svg>

        </div>
        <ng-template #elseBlock>


        </ng-template>
        <!-- **************************************-->
    </div>
    <div class="table-cell">
        <div *ngIf="checkEstadoActaActivo; else elseBlockPDP">
            <button disabled routerLink="#"> Ver Información </button>
            <button routerLink="/direccion"> Ingresar </button>
        </div>
        <ng-template #elseBlockPDP>
            <button disabled routerLink="#"> Ver Información </button>
            <button disabled routerLink="#"> Ingresar </button>
        </ng-template>
    </div>



    <!-- *******************************************************************************************-->
    <div class="table-cell cell-feature"> Planificacion para la gestion del alcance </div>
    <div class="table-cell">
        <!-- **************************************-->
        <div *ngIf="checkEstadoPdpVar; else elseBlock">

            <svg width="18" height="18" viewBox="0 0 18 18">
          <title>check_blue</title>
          <path
            d="M6.116 14.884c.488.488 1.28.488 1.768 0l10-10c.488-.488.488-1.28 0-1.768s-1.28-.488-1.768 0l-9.08 9.15-4.152-4.15c-.488-.488-1.28-.488-1.768 0s-.488 1.28 0 1.768l5 5z"
            fill="limegreen" fill-rule="evenodd" />
        </svg>

        </div>
        <ng-template #elseBlock>


        </ng-template>
        <!-- **************************************-->
    </div>
    <div class="table-cell">
        <button disabled routerLink="#"> Ver Información </button>
        <button disabled> Ingresar </button>
    </div>
    <!-- *******************************************************************************************-->
    <div class="table-cell cell-feature"> Planificacion de Gestion del Cronograma</div>
    <div class="table-cell"></div>
    <div class="table-cell">
        <button disabled routerLink="#"> Ver Información </button>
        <button disabled> Ingresar </button>
    </div>
    <div class="table-cell cell-feature"> Definicion de las Actividades </div>
    <div class="table-cell"></div>
    <div class="table-cell">
        <button disabled routerLink="#"> Ver Información </button>
        <button disabled> Ingresar </button>

    </div>
</div>

  <ng-template matExpansionPanelContent>

  </ng-template>
</mat-expansion-panel>
</mat-accordion>
